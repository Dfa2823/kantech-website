<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3BFF"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#6C2FD9"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#1E3BFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E3BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#6C2FD9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6C2FD9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1E3BFF" fill-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Orbs -->
  <ellipse cx="240" cy="252" rx="480" ry="360" fill="url(#orb1)"/>
  <ellipse cx="960" cy="378" rx="420" ry="315" fill="url(#orb2)"/>
  <!-- Logo K -->
  <rect x="120" y="200" width="72" height="72" rx="16" fill="url(#textGrad)"/>
  <text x="156" y="251" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="white" text-anchor="middle">K</text>
  <!-- KANTECH -->
  <text x="212" y="253" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#F4F6FF" letter-spacing="4">KANTECH</text>
  <!-- Divider -->
  <rect x="120" y="295" width="960" height="1" fill="#1E293B"/>
  <!-- Headline -->
  <text x="120" y="375" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="url(#textGrad)">Tu empresa en modo</text>
  <text x="120" y="450" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="url(#textGrad)">automático.</text>
  <!-- Tagline -->
  <text x="120" y="510" font-family="Arial, sans-serif" font-size="24" fill="#94A3B8">Agentes IA · Automatizaciones · Desarrollo a Medida · Colombia</text>
</svg>
